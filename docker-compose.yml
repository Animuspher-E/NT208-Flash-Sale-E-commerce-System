version: '3.8'

services:
  # DATABASE (POSTGRESQL)
  postgres:
    image: postgres:15-alpine
    container_name: nt208-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flashsale_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # CACHING (REDIS)
  redis:
    image: redis:alpine
    container_name: nt208-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MESSAGE QUEUE (RABBITMQ)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nt208-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
  # BACKEND (NODE.JS)
  backend:
    build: ./backend
    container_name: nt208-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/flashsale_db?schema=public
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=development
      - PORT=3000
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "3000:3000"


  # CÔNG CỤ QUẢN LÝ DATABASE
  adminer:
    image: adminer
    container_name: nt208-adminer
    restart: always
    ports:
      - "8080:8080"

  # --- CÔNG CỤ QUẢN LÝ REDIS (Giao diện Web) ---
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nt208-redis-mgmt
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
