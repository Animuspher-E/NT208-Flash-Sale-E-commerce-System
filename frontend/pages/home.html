<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Sale E-Commerce</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/home.css">
</head>

<body>
  <!-- HEADER -->
  <div class="header">
    <div class="logo" onclick="goHome()">
      <i class="fa-solid fa-bolt"></i>
      E-<span>Commerce</span>
    </div>

    <div class="search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="searchInput" placeholder="Tìm kiếm sản phẩm...">
    </div>

    <div class="nav">
      <button class="icon-btn" onclick="goHome()">
        <i class="fa-solid fa-house"></i>
      </button>

      <button class="icon-btn" onclick="viewCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cart">0</span>
      </button>

      <button class="icon-btn" id="userBtn" onclick="handleUserClick()">
        <img id="userAvatar" class="avatar-mini hidden">
        <span id="loginText">Đăng nhập</span>
      </button>

      <button class="icon-btn hidden" id="logoutBtn" type="button">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
      </button>
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="category-row">

    <div class="category" onclick="filterCategory('Electronics', event)">
      <div class="category-img"> <img src="../assets/img/category/electronics.jpg"> </div>
      <span>Thiết bị điện tử</span>
    </div>

    <div class="category" onclick="filterCategory('Fashion', event)">
      <div class="category-img"> <img src="../assets/img/category/fashion.png"> </div>
      <span>Thời trang</span>
    </div>

    <div class="category" onclick="filterCategory('Beauty', event)">
      <div class="category-img"> <img src="../assets/img/category/beauty.png"> </div>
      <span>Sắc đẹp</span>
    </div>

    <div class="category" onclick="filterCategory('Home', event)">
      <div class="category-img"> <img src="../assets/img/category/home.png"> </div>
      <span>Nhà cửa</span>
    </div>

    <div class="category" onclick="filterCategory('Sports', event)">
      <div class="category-img"> <img src="../assets/img/category/sports.png"> </div>
      <span>Thể thao</span>
    </div>

    <div class="category" onclick="filterCategory('Gaming', event)">
      <div class="category-img"> <img src="../assets/img/category/gaming.png"> </div>
      <span>Gaming</span>
    </div>

    <div class="category" onclick="filterCategory('Books', event)">
      <div class="category-img"> <img src="../assets/img/category/books.png"> </div>
      <span>Sách</span>
    </div>

    <div class="category" onclick="filterCategory('Accessories', event)">
      <div class="category-img"> <img src="../assets/img/category/accessories.png"> </div>
      <span>Phụ kiện</span>
    </div>

    <div class="category" onclick="filterCategory('Health', event)">
      <div class="category-img"> <img src="../assets/img/category/health.png"> </div>
      <span>Sức khỏe</span>
    </div>

    <div class="category" onclick="filterCategory('Camera', event)">
      <div class="category-img"> <img src="../assets/img/category/camera.png"> </div>
      <span>Máy ảnh</span>
    </div>

    <div class="category" onclick="filterCategory('Shoes', event)">
      <div class="category-img"> <img src="../assets/img/category/shoes.png"> </div>
      <span>Giày dép</span>
    </div>

    <div class="category" onclick="filterCategory('Kids', event)">
      <div class="category-img"> <img src="../assets/img/category/kids.png"> </div>
      <span>Mẹ & Bé</span>
    </div>

    <div class="category" onclick="filterCategory('Toys', event)">
      <div class="category-img"> <img src="../assets/img/category/toys.png"> </div>
      <span>Đồ chơi</span>
    </div>

    <div class="category" onclick="filterCategory('Pets', event)">
      <div class="category-img"> <img src="../assets/img/category/pets.png"> </div>
      <span>Thú cưng</span>
    </div>
  </div>

  <!-- BANNER -->
  <div class="banner" onclick="goFlash()">
    <img src="../assets/img/banner sơn.k.png" alt="Flash Sale Banner">
  </div>

  <div class="section" id="category-section" style="display:none;">
    <h2 id="category-title"></h2>
    <div class="grid" id="category-list"></div>
  </div>

  <!-- FLASH SALE -->
  <div class="section" id="flash-section">
    <h2 style="color:red;">FLASH SALE (<span id="flash-timer"></span>)</h2>
    <div class="grid" id="flash"></div>
    <button onclick="goFlash()" class="load-more">Xem thêm</button>
  </div>

  <!-- BEST SELLER -->
  <div class="section" id="best-section">
    <h2>🔥 BÁN CHẠY</h2>
    <div class="grid" id="best"></div>
    <button onclick="loadMore('best')" class="load-more">Xem thêm</button>
  </div>

  <!-- RECOMMENDED -->
  <div class="section" id="recommend-section">
    <h2>⭐ DÀNH CHO BẠN</h2>
    <div class="grid" id="recommend"></div>
    <button onclick="loadMore('recommend')" class="load-more">Xem thêm</button>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 E-Commerce | Flash Sale System
  </div>

  <script src="http://localhost:3000/socket.io/socket.io.js"></script>
  <script src="../assets/js/home/data.js"></script>
  <script src="../assets/js/home/render.js"></script>
  <script src="../assets/js/home/filter.js"></script>
  <script src="../assets/js/home/search.js"></script>
  <script src="../assets/js/home/cart.js"></script>
  <script src="../assets/js/home/main.js"></script>
</body>
</html>
