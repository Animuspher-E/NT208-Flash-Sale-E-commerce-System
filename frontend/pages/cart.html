<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyMe | Giỏ hàng</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/auth-cart-orders.css">
  <style>
    /* === CART ITEM REDESIGN === */
    .cart-item {
      display: flex;
      align-items: stretch;
      gap: 0;
      padding: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--line-soft);
      background: #fff;
      transition: box-shadow 0.2s;
    }

    .cart-item:hover {
      box-shadow: 0 4px 18px rgba(20, 86, 184, 0.10);
    }

    .cart-item-check {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      background: var(--surface);
      border-right: 1px solid var(--line-soft);
    }

    .cart-item-check input[type=checkbox] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primary-600);
    }

    .cart-thumb {
      width: 110px;
      height: 100px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--surface-strong);
      position: relative;
    }

    .cart-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-thumb a {
      display: block;
      height: 100%;
    }

    .oos-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .item-main {
      flex: 1;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .item-main h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin: 0;
      line-height: 1.35;
    }

    .item-main h3 a:hover {
      color: var(--primary-600);
    }

    .item-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .item-price-row strong {
      font-size: 16px;
      font-weight: 800;
      color: var(--accent-700);
    }

    .item-price-row small {
      font-size: 12px;
      color: var(--muted);
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .qty-btn:hover:not(:disabled) {
      background: var(--surface-strong);
    }

    .qty-val {
      min-width: 28px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .cart-item-actions {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 8px;
      padding: 14px 14px;
      border-left: 1px solid var(--line-soft);
      background: var(--surface);
      min-width: 120px;
    }

    .btn-buy-now {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: linear-gradient(90deg, var(--primary-700), var(--primary-500));
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn-buy-now:hover {
      opacity: 0.88;
    }

    .btn-remove {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: none;
      border: 1px solid #fecdd3;
      color: var(--error);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-remove:hover {
      background: #fff1f2;
    }

    /* === SUMMARY CARD REDESIGN === */
    .summary-card {
      background: #fff;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      padding: 20px;
      position: sticky;
      top: 16px;
    }

    .summary-card h3 {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      padding-bottom: 12px;
      margin-bottom: 4px;
      border-bottom: 2px solid var(--line-soft);
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      font-size: 14px;
      border-bottom: 1px solid var(--line-soft);
      color: var(--muted);
    }

    .summary-line strong {
      color: var(--text);
      font-size: 15px;
    }

    .summary-line.total strong {
      color: var(--accent-700);
      font-size: 18px;
      font-weight: 900;
    }

    .shipping-info-box {
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      font-size: 13px;
    }

    .shipping-info-box .shipping-label {
      font-weight: 700;
      font-size: 12px;
      color: var(--primary-600);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .checkout-btn {
      width: 100%;
      margin-top: 16px;
      min-height: 50px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--primary-700), var(--primary-500));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(20, 86, 184, 0.25);
      transition: opacity 0.2s, transform 0.15s;
    }

    .checkout-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .checkout-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* toolbar */
    .select-all-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      transition: border-color 0.15s;
    }

    .select-all-label:hover {
      border-color: var(--primary-500);
      color: var(--primary-600);
    }

    .select-all-label input {
      accent-color: var(--primary-600);
      width: 16px;
      height: 16px;
    }

    /* app-panel */
    .app-panel {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--line-soft);
    }

    .cart-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    @media (max-width: 680px) {
      .cart-item {
        flex-wrap: wrap;
      }

      .cart-thumb {
        width: 100%;
        height: 160px;
      }

      .cart-item-actions {
        flex-direction: row;
        min-width: auto;
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--line-soft);
      }
    }


    /* ===================================================
       POPUP — ấm, tự nhiên, như người thật thiết kế
    =================================================== */
    @keyframes popupSlideUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes iconSettle {
      0% {
        opacity: 0;
        transform: scale(0.6);
      }

      70% {
        transform: scale(1.08);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .custom-popup-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s;
      padding: 20px;
    }

    .custom-popup-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(15, 20, 35, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .custom-popup-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .popup-box {
      position: relative;
      background: #fafaf9;
      border-radius: 10px;
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.13), 0 1px 4px rgba(0, 0, 0, 0.07);
      animation: none;
    }

    .custom-popup-overlay.show .popup-box {
      animation: popupSlideUp 0.26s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* Drag handle (mobile feel) */
    .popup-handle {
      width: 36px;
      height: 4px;
      border-radius: 99px;
      background: #d1d5db;
      margin: 14px auto 0;
    }

    @media (min-width: 560px) {
      .popup-handle {
        display: none;
      }
    }

    /* Header — không gradient cứng, chỉ là một vùng màu nhạt ấm */
    .popup-header {
      padding: 24px 28px 20px;
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }

    .popup-box.type-success .popup-header {
      background: #f6fdf7;
    }

    .popup-box.type-error .popup-header {
      background: #fef7f7;
    }

    .popup-box.type-info .popup-header {
      background: #f5f9ff;
    }

    .popup-box.type-warning .popup-header {
      background: #fffbf3;
    }

    /* Icon — nhỏ hơn, bên trái, cảm giác tự nhiên như avatar */
    .popup-icon-wrap {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .custom-popup-overlay.show .popup-icon-wrap {
      animation: iconSettle 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }

    .popup-box.type-success .popup-icon-wrap {
      background: #d1fae5;
      color: #059669;
    }

    .popup-box.type-error .popup-icon-wrap {
      background: #fee2e2;
      color: #dc2626;
    }

    .popup-box.type-info .popup-icon-wrap {
      background: #dbeafe;
      color: #2563eb;
    }

    .popup-box.type-warning .popup-icon-wrap {
      background: #fef3c7;
      color: #d97706;
    }

    .popup-heading {
      flex: 1;
    }

    .popup-title {
      font-size: 17px;
      font-weight: 700;
      color: #1c1917;
      line-height: 1.35;
      margin: 0 0 4px;
      letter-spacing: -0.1px;
    }

    .popup-subtitle {
      font-size: 13px;
      color: #78716c;
      margin: 0;
      line-height: 1.5;
    }

    /* Divider — nhẹ thôi */
    .popup-divider {
      height: 1px;
      background: #e7e5e4;
      margin: 0 28px;
    }

    /* Body — list sản phẩm */
    .popup-body {
      padding: 16px 28px 20px;
      max-height: 260px;
      overflow-y: auto;
    }

    .popup-body::-webkit-scrollbar {
      width: 3px;
    }

    .popup-body::-webkit-scrollbar-thumb {
      background: #d6d3d1;
      border-radius: 99px;
    }

    /* Mỗi sản phẩm — đơn giản như dòng trong danh sách */
    .popup-item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      font-size: 14px;
      border-bottom: 1px solid #f5f5f4;
    }

    .popup-item-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .popup-item-row:first-child {
      padding-top: 0;
    }

    .row-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 2px;
    }

    .row-success .row-dot {
      background: #34d399;
    }

    .row-error .row-dot {
      background: #f87171;
    }

    .popup-item-row .row-name {
      flex: 1;
      font-weight: 600;
      color: #292524;
      font-size: 13.5px;
      line-height: 1.35;
    }

    .popup-item-row .row-reason {
      font-size: 12px;
      color: #a8a29e;
      margin-top: 2px;
    }

    .row-info-wrap {
      flex: 1;
    }

    .popup-plain-msg {
      color: #57534e;
      font-size: 14px;
      line-height: 1.7;
      padding: 4px 0;
    }

    /* Footer */
    .popup-footer {
      padding: 0 28px 28px;
      display: flex;
      gap: 8px;
    }

    .popup-footer.single {
      justify-content: stretch;
    }

    .popup-footer.single .popup-btn {
      width: 100%;
    }

    .popup-btn {
      flex: 1;
      padding: 11px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      letter-spacing: 0;
    }

    .popup-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .popup-btn-primary {
      color: #fff;
    }

    .popup-btn-primary:hover {
      filter: brightness(1.06);
    }

    /* Màu nút theo loại — không quá bão hòa, nhìn tự nhiên */
    .type-success .popup-btn-primary {
      background: #10b981;
    }

    .type-error .popup-btn-primary {
      background: #ef4444;
    }

    .type-info .popup-btn-primary {
      background: #3b82f6;
    }

    .type-warning .popup-btn-primary {
      background: #f59e0b;
    }

    .popup-btn-ghost {
      background: transparent;
      color: #78716c;
      border: 1.5px solid #e7e5e4;
    }

    .popup-btn-ghost:hover {
      background: #fafaf9;
      color: #44403c;
    }

    /* Progress bar auto-close — mỏng và tinh tế */
    .popup-progress {
      height: 2px;
      background: #e7e5e4;
    }

    .popup-progress-bar {
      height: 100%;
      width: 100%;
      transform-origin: left;
      transition: transform linear;
    }

    .type-success .popup-progress-bar {
      background: #10b981;
    }

    .type-error .popup-progress-bar {
      background: #ef4444;
    }

    .type-info .popup-progress-bar {
      background: #3b82f6;
    }
  </style>
</head>

<body>
  <main class="app-page">
    <div class="app-shell">
      <header class="app-header">
        <a class="logo" href="../home.html" aria-label="BuyMe">
          <i class="fa-solid fa-bolt"></i>
          Buy<span>Me</span>
        </a>

        <nav class="nav-tabs" aria-label="Điều hướng">
          <a class="nav-tab active" href="cart.html">
            <i class="fa-solid fa-cart-shopping"></i>
            Giỏ hàng
          </a>
          <a class="nav-tab" href="orders.html">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Lịch sử
          </a>
        </nav>

        <div class="header-actions">
          <button class="icon-btn" onclick="goHome()">
            <i class="fa-solid fa-house"></i>
          </button>
          <button class="icon-btn" onclick="goProfile()">
            <img id="headerAvatar" src="./img/default-avatar.png" class="avatar-mini">
          </button>
          <button class="icon-btn" id="logoutBtn" type="button" aria-label="Đăng xuất" title="Đăng xuất">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
          </button>
        </div>
      </header>


      <div id="appMessage" class="app-message" style="margin-top: 1rem;" role="status" aria-live="polite"></div>

      <section class="app-panel">
        <div class="section-toolbar">
          <div class="section-title">
            <h2>Giỏ hàng <span style="font-size:15px;font-weight:500;color:var(--muted);" id="cartCountLabel"></span>
            </h2>
          </div>
          <div class="toolbar-actions" style="display:flex;gap:10px;align-items:center;">
            <label class="select-all-label">
              <input type="checkbox" id="selectAllCheck"> Chọn tất cả
            </label>
            <button class="ghost-button" id="clearCartBtn" type="button" style="border-radius:6px;">
              <i class="fa-solid fa-trash"></i> Xóa giỏ
            </button>
          </div>
        </div>

        <div class="cart-layout" style="padding:18px;gap:20px;">
          <div id="cartList" class="cart-list"></div>
          <aside class="summary-card" aria-label="Tóm tắt giỏ hàng">
            <h3><i class="fa-solid fa-receipt" style="color:var(--primary-500);margin-right:7px;"></i>Tóm tắt đơn hàng
            </h3>
            <div class="summary-line">
              <span>Sản phẩm đã chọn</span>
              <strong id="cartItemCount">0</strong>
            </div>
            <div class="summary-line total">
              <span>Tạm tính</span>
              <strong id="cartSubtotal">0đ</strong>
            </div>
            <div class="summary-line" style="border-bottom:none;">
              <span>Trạng thái</span>
              <strong id="cartStatus" style="font-size:13px;">Chưa chọn</strong>
            </div>

            <div id="shippingInfo" class="shipping-info-box hidden">
              <div class="shipping-label"><i class="fa-solid fa-location-dot"></i> Địa chỉ nhận hàng</div>
              <div id="shippingAddressContent" style="color:var(--text);line-height:1.5;font-size:13px;"></div>
            </div>

            <button class="checkout-btn" id="checkoutBtn" type="button">
              <i class="fa-solid fa-bolt"></i> Chốt đơn ngay
            </button>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <script src="../assets/js/auth-cart-orders-common.js"></script>
  <script>
    const BF = window.ECommerce;
    if (!BF.requireAuth()) {
      throw new Error("Authentication required");
    }

    const state = {
      products: [],
      cart: BF.readCart(),
      isCheckingOut: false,
      addresses: [],
      selectedAddressIndex: 0,
      checkedIds: new Set()
    };

    const els = {
      appMessage: document.getElementById("appMessage"),
      cartList: document.getElementById("cartList"),
      cartCount: document.getElementById("cartCount"),
      cartItemCount: document.getElementById("cartItemCount"),
      cartSubtotal: document.getElementById("cartSubtotal"),
      cartStatus: document.getElementById("cartStatus"),
      checkoutBtn: document.getElementById("checkoutBtn")
    };

    function setAppMessage(text, type = "info") {
      if (els.appMessage) els.appMessage.style.display = "none";
      if (!text) return;

      let title = "Thông báo";
      if (type === "error") title = "Lỗi";
      if (type === "success") title = "Thành công";

      if (text.includes("Vui lòng chọn ít nhất 1 sản phẩm")) title = "Chưa chọn sản phẩm";
      if (text.includes("Vui lòng thêm địa chỉ")) title = "Thiếu địa chỉ giao hàng";
      if (text.includes("Sản phẩm hết hàng:")) title = "Sản phẩm hết hàng";
      if (text.includes("Đã thêm sản phẩm") || text.includes("Đã tăng số lượng")) title = "Thêm vào giỏ";
      if (text.includes("Đã xóa giỏ")) title = "Xóa giỏ hàng";

      showBeautifulPopup(type, title, text);
    }

    function renderStats() {
      // Tính dựa trên item được tích chọn
      const checkedItems = state.cart.filter(item => state.checkedIds.has(Number(item.id)));
      const total = checkedItems.reduce((sum, item) => sum + (Number(item.price || 0) * (Number(item.quantity) || 1)), 0);
      els.cartCount.textContent = state.cart.length;
      els.cartItemCount.textContent = `${checkedItems.length}/${state.cart.length}`;
      els.cartSubtotal.textContent = BF.formatCurrency(total);
      els.cartStatus.textContent = checkedItems.length ? `Đã chọn ${checkedItems.length} sản phẩm` : "Chưa chọn sản phẩm";

      // Sync select-all checkbox
      const selectAll = document.getElementById('selectAllCheck');
      if (selectAll) selectAll.checked = state.cart.length > 0 && checkedItems.length === state.cart.length;

      const shippingInfo = document.getElementById("shippingInfo");
      const addressContent = document.getElementById("shippingAddressContent");
      if (state.addresses.length > 0) {
        const addr = state.addresses[state.selectedAddressIndex];
        shippingInfo.classList.remove("hidden");
        addressContent.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div><strong>${BF.escapeHtml(addr.fullName)}</strong> · ${BF.escapeHtml(addr.phone)}<br>
            ${BF.escapeHtml(addr.detail)}, ${BF.escapeHtml(addr.ward)}, ${BF.escapeHtml(addr.district)}, ${BF.escapeHtml(addr.province)}</div>
            ${state.addresses.length > 1 ? `<button class="ghost-button mini" onclick="showAddressSelector()" style="padding:2px 8px;font-size:11px;">Thay đổi</button>` : ''}
          </div>`;
      } else { shippingInfo.classList.add("hidden"); }
    }

    function showAddressSelector() {
      const modal = document.createElement('div');
      modal.id = 'addressSelectorModal';
      modal.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;';

      const content = `
        <div style="background:#fff;padding:25px;border-radius:12px;width:90%;max-width:450px;box-shadow:0 10px 25px rgba(0,0,0,0.1);">
          <h3 style="margin-top:0;margin-bottom:15px;font-size:18px;">Chọn địa chỉ nhận hàng</h3>
          <div style="max-height:300px;overflow-y:auto;margin-bottom:20px;">
            ${state.addresses.map((addr, index) => `
              <div onclick="selectAddress(${index})" style="padding:12px;border:1px solid ${index === state.selectedAddressIndex ? '#3b82f6' : '#eee'};border-radius:8px;margin-bottom:10px;cursor:pointer;background:${index === state.selectedAddressIndex ? '#eff6ff' : '#fff'}; transition:all 0.2s;">
                <div style="display:flex; justify-content:space-between;">
                  <strong style="font-size:14px;">${addr.fullName}</strong>
                  <span style="font-size:12px; color:#666;">${addr.phone}</span>
                </div>
                <div style="font-size:12px;color:#666;margin-top:4px;">${addr.detail}, ${addr.ward}, ${addr.district}, ${addr.province}</div>
              </div>
            `).join('')}
          </div>
          <div style="display:flex;justify-content:flex-end; gap: 10px;">
            <button onclick="document.getElementById('addressSelectorModal').remove()" style="background:#f1f5f9;color:#475569;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:500;">Đóng</button>
            <a href="profile.html?tab=address" style="background:#3b82f6;color:#fff;text-decoration:none;padding:8px 16px;border-radius:6px;font-weight:500;font-size:13px;">+ Thêm địa chỉ mới</a>
          </div>
        </div>
      `;

      modal.innerHTML = content;
      document.body.appendChild(modal);
    }

    function selectAddress(index) {
      state.selectedAddressIndex = index;
      document.getElementById('addressSelectorModal').remove();
      renderStats();
    }

    async function loadAddresses() {
      try {
        const res = await BF.apiRequest("/api/users/addresses");
        if (res.success && Array.isArray(res.data)) {
          state.addresses = res.data;
          // Tìm index của địa chỉ mặc định
          const defaultIdx = state.addresses.findIndex(a => a.isDefault);
          if (defaultIdx !== -1) state.selectedAddressIndex = defaultIdx;

          renderStats();
        }
      } catch (err) {
        console.error("Lỗi tải địa chỉ:", err);
      }
    }

    async function loadProducts() {
      try {
        const data = await BF.apiRequest("/api/flashsale/products", { auth: false });
        state.products = Array.isArray(data.data) ? data.data : [];
        let cartUpdated = false;
        state.cart = state.cart.map(item => {
          const product = findProduct(item.id);
          if (product) {
            const discount = Number(product.discount || 0);
            const finalPrice = product.price - (product.price * discount / 100);
            if (item.price !== finalPrice) { item.price = finalPrice; cartUpdated = true; }
            // [Feature 2] Đồng bộ tồn kho thời gian thực
            item.stock = product.stock;
            item.outOfStock = product.stock <= 0;
          }
          return item;
        });
        if (cartUpdated) BF.saveCart(state.cart);
        // Khởi tạo checked set: mặc định chọn tất cả sản phẩm còn hàng
        if (state.checkedIds.size === 0) {
          state.cart.forEach(item => { if (!item.outOfStock) state.checkedIds.add(Number(item.id)); });
        }
        renderCart();
        renderStats();
        setAppMessage("");
      } catch (error) {
        state.products = [];
        setAppMessage(error.message || "Không tải được sản phẩm.", "error");
      }
    }



    function findProduct(productId) {
      return state.products.find(product => Number(product.id) === Number(productId));
    }

    function saveAndRenderCart() {
      BF.saveCart(state.cart);
      renderCart();
      renderStats();
    }

    function addToCart(product) {
      if (!product) return;
      if (Number(product.stock || 0) <= 0) {
        setAppMessage("Sản phẩm đã hết hàng.", "error");
        return;
      }
      const existingItem = state.cart.find(item => Number(item.id) === Number(product.id));
      if (existingItem) {
        existingItem.quantity = (Number(existingItem.quantity) || 1) + 1;
        saveAndRenderCart();
        setAppMessage(`Đã tăng số lượng ${product.name} trong giỏ hàng.`, "success");
        return;
      }

      const discount = Number(product.discount || 0);
      const finalPrice = product.price - (product.price * discount / 100);

      state.cart.push({
        id: product.id,
        name: product.name,
        price: finalPrice,
        image: product.image,
        stock: product.stock
      });
      saveAndRenderCart();
      setAppMessage("Đã thêm sản phẩm vào giỏ hàng.", "success");
    }

    function removeFromCart(productId) {
      state.cart = state.cart.filter(item => Number(item.id) !== Number(productId));
      saveAndRenderCart();
    }

    function clearCart() {
      state.cart = [];
      saveAndRenderCart();
      setAppMessage("Đã xóa giỏ hàng.", "info");
    }

    function renderCart() {
      if (!state.cart.length) {
        els.cartList.innerHTML = BF.emptyState("fa-cart-shopping", "Giỏ hàng trống", "Thêm sản phẩm để chốt đơn.");
        return;
      }
      els.cartList.innerHTML = state.cart.map(function (item) {
        const image = item.image || "https://images.unsplash.com/photo-1607082349566-187342175e2f?q=80&w=900&auto=format&fit=crop";
        const qty = Number(item.quantity) || 1;
        const oos = item.outOfStock;
        const checked = state.checkedIds.has(Number(item.id));
        const detailUrl = `product-detail.html?id=${item.id}`;
        return `
          <article class="cart-item" style="opacity:${oos ? 0.65 : 1};">
            <div class="cart-item-check">
              <input type="checkbox" data-item-check="${item.id}"
                ${checked && !oos ? 'checked' : ''} ${oos ? 'disabled' : ''}
                onchange="toggleCheck(${item.id}, this.checked)">
            </div>
            <div class="cart-thumb">
              <a href="${detailUrl}"><img src="${BF.escapeHtml(image)}" alt="${BF.escapeHtml(item.name || 'Sản phẩm')}"></a>
              ${oos ? '<span class="oos-badge">Hết hàng</span>' : ''}
            </div>
            <div class="item-main">
              <h3><a href="${detailUrl}">${BF.escapeHtml(item.name || 'Sản phẩm')}</a></h3>
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQuantity(${item.id}, -1)" ${oos ? 'disabled' : ''}>−</button>
                <span class="qty-val">${qty}</span>
                <button class="qty-btn" onclick="changeQuantity(${item.id}, 1)" ${oos ? 'disabled' : ''}>+</button>
              </div>
              <div class="item-price-row">
                <strong>${BF.formatCurrency(item.price * qty)}</strong>
                <small>Đơn giá: ${BF.formatCurrency(item.price)}</small>
              </div>
            </div>
            <div class="cart-item-actions">
              ${!oos ? `<button class="btn-buy-now" onclick="buyNowSingle(${item.id})"><i class="fa-solid fa-bolt"></i> Mua ngay</button>` : '<span style="font-size:11px;color:var(--muted);text-align:center;">Không có<br>hàng</span>'}
              <button class="btn-remove" data-cart-remove="${item.id}"><i class="fa-solid fa-trash"></i> Xóa</button>
            </div>
          </article>
        `;
      }).join("");
    }

    // [Feature 1] Toggle checkbox
    function toggleCheck(id, checked) {
      if (checked) state.checkedIds.add(Number(id));
      else state.checkedIds.delete(Number(id));
      renderStats();
    }

    function toggleSelectAll(checked) {
      state.cart.forEach(item => {
        if (!item.outOfStock) {
          if (checked) state.checkedIds.add(Number(item.id));
          else state.checkedIds.delete(Number(item.id));
        }
      });
      renderCart();
      renderStats();
    }

    // [Feature 3] Mua ngay 1 sản phẩm trong giỏ
    async function buyNowSingle(productId) {
      if (state.addresses.length === 0) {
        setAppMessage('Vui lòng thêm địa chỉ giao hàng trước.', 'error');
        return;
      }
      const item = state.cart.find(x => Number(x.id) === Number(productId));
      if (!item) return;
      const btn = document.querySelector(`[onclick="buyNowSingle(${productId})"]`);
      if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>'; }
      try {
        await buyProduct(item, { silent: true });
        removeFromCart(productId);
        setAppMessage(`Đã mua thành công "${item.name}"! Đang chuyển đến đơn hàng...`, 'success');
        setTimeout(() => window.location.href = 'orders.html', 1500);
      } catch (err) {
        setAppMessage(`Không thể mua "${item.name}": ${err.message}`, 'error');
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-bolt"></i> Mua ngay'; }
      }
    }

    function changeQuantity(id, delta) {
      const item = state.cart.find(x => Number(x.id) === Number(id));
      if (!item) return;

      const newQty = (Number(item.quantity) || 1) + delta;
      if (newQty < 1) return; // Không cho xuống dưới 1, nếu muốn xóa phải nhấn nút Xóa

      // Kiểm tra tồn kho nếu cần (tùy chọn)
      if (delta > 0 && item.stock && newQty > item.stock) {
        setAppMessage(`Chỉ còn ${item.stock} sản phẩm trong kho.`, "error");
        return;
      }

      item.quantity = newQty;
      saveAndRenderCart();
    }

    async function buyProduct(product, options = {}) {
      const addr = state.addresses[state.selectedAddressIndex];
      const shippingAddress = addr ? `${addr.fullName} | ${addr.phone} | ${addr.detail}, ${addr.ward}, ${addr.district}, ${addr.province}` : null;

      const data = await BF.apiRequest("/api/flashsale/buy", {
        method: "POST",
        body: {
          productId: Number(product.id),
          quantity: Number(product.quantity) || 1,
          shippingAddress: shippingAddress
        }
      });
      const orderId = data && data.data ? data.data.orderId : null;

      if (!options.silent) {
        setAppMessage(`Đã chốt đơn${orderId ? ` #${orderId}` : ""} cho ${product.name}.`, "success");
      }

      return {
        orderId,
        productId: data && data.data ? data.data.productId : Number(product.id),
        remainingStock: data && data.data ? data.data.remainingStock : null,
        raw: data
      };
    }

    async function buyNow(product) {
      if (!product) return;
      const button = document.querySelector(`[data-product-action="buy"][data-product-id="${product.id}"]`);
      BF.setButtonLoading(button, true, "Đang mua");
      try {
        await buyProduct(product);
        removeFromCart(product.id);
        await loadProducts();
        window.location.href = "orders.html";
      } catch (error) {
        setAppMessage(error.message || "Không thể mua sản phẩm.", "error");
      } finally {
        BF.setButtonLoading(button, false);
      }
    }

    async function checkoutCart() {
      const checkedItems = state.cart.filter(item => state.checkedIds.has(Number(item.id)));
      if (!checkedItems.length || state.isCheckingOut) {
        if (!checkedItems.length) setAppMessage('Vui lòng chọn ít nhất 1 sản phẩm để chốt đơn.', 'error');
        return;
      }
      if (state.addresses.length === 0) {
        setAppMessage('Vui lòng thêm địa chỉ giao hàng để chốt đơn.', 'error');
        setTimeout(() => { window.location.href = 'profile.html?tab=address'; }, 2000);
        return;
      }
      const outOfStockItems = checkedItems.filter(i => i.outOfStock);
      if (outOfStockItems.length) {
        setAppMessage(`Sản phẩm hết hàng: ${outOfStockItems.map(i => i.name).join(', ')}. Vui lòng bỏ chọn hoặc xóa khỏi giỏ.`, 'error');
        return;
      }
      state.isCheckingOut = true;
      BF.setButtonLoading(els.checkoutBtn, true, 'Đang chốt đơn');

      const addr = state.addresses[state.selectedAddressIndex];
      const shippingAddress = addr ? `${addr.fullName} | ${addr.phone} | ${addr.detail}, ${addr.ward}, ${addr.district}, ${addr.province}` : null;

      try {
        const data = await BF.apiRequest("/api/flashsale/buy-cart", {
          method: "POST",
          body: {
            items: checkedItems.map(i => ({ productId: Number(i.id), quantity: Number(i.quantity) || 1 })),
            shippingAddress: shippingAddress
          }
        });

        const successfulItems = data.data ? data.data.successfulItems : [];
        const failures = data.data ? data.data.failures : [];

        const purchasedIds = successfulItems.map(i => Number(i.productId));

        // Remove purchased items from cart
        state.cart = state.cart.filter(item => !purchasedIds.includes(Number(item.id)));
        purchasedIds.forEach(id => state.checkedIds.delete(id));
        saveAndRenderCart();
        await loadProducts();

        if (purchasedIds.length && !failures.length) {
          // All success — show success popup then auto-redirect
          const successItems = successfulItems.map(it => {
            const p = checkedItems.find(c => Number(c.id) === Number(it.productId));
            return { status: 'success', name: p ? p.name : `Sản phẩm #${it.productId}` };
          });
          showBeautifulPopup('success', `Chốt đơn thành công!`, successItems, {
            subtitle: `Đã đặt ${purchasedIds.length} sản phẩm vào 1 đơn hàng`,
            autoClose: 2200,
            onConfirm: () => { window.location.href = 'orders.html'; }
          });
          setTimeout(() => { window.location.href = 'orders.html'; }, 2200);
        } else if (purchasedIds.length && failures.length) {
          // Partial — show mixed items
          const allItems = [
            ...successfulItems.map(it => {
              const p = checkedItems.find(c => Number(c.id) === Number(it.productId));
              return { status: 'success', name: p ? p.name : `Sản phẩm #${it.productId}` };
            }),
            ...failures.map(f => {
              const p = checkedItems.find(c => Number(c.id) === Number(f.productId));
              return { status: 'error', name: p ? p.name : `Sản phẩm #${f.productId}`, reason: f.reason };
            })
          ];
          showBeautifulPopup('info', 'Hoàn tất một phần', allItems, {
            subtitle: `${purchasedIds.length} thành công · ${failures.length} thất bại`
          });
        } else {
          // Tất cả thất bại — hiện danh sách lý do
          const allErrItems = failures.map(f => {
            const p = checkedItems.find(c => Number(c.id) === Number(f.productId));
            return { status: 'error', name: p ? p.name : `Sản phẩm #${f.productId}`, reason: f.reason };
          });
          showBeautifulPopup('error', 'Không đặt được đơn hàng', allErrItems);
        }

      } catch (error) {
        let errItems;
        if (error.raw && error.raw.failures && error.raw.failures.length) {
          errItems = error.raw.failures.map(f => {
            const p = checkedItems.find(i => Number(i.id) === Number(f.productId));
            return { status: 'error', name: p ? p.name : `Sản phẩm #${f.productId}`, reason: f.reason };
          });
        } else {
          errItems = error.message
            .replace(/^Không thể (chốt đơn|tạo đơn hàng)[.:]?\s*/i, '')
            || 'Vui lòng thử lại sau ít phút.';
        }
        showBeautifulPopup('error', 'Không đặt được đơn hàng', errItems);
      }

      state.isCheckingOut = false;
      BF.setButtonLoading(els.checkoutBtn, false);
    }

    function showBeautifulPopup(type, title, items = [], options = {}) {
      // items = [{status: 'success'|'error', name, reason}] OR string for plain message
      const overlay = document.createElement('div');
      overlay.className = 'custom-popup-overlay';

      const iconMap = {
        success: '<i class="fa-solid fa-check"></i>',
        error:   '<i class="fa-solid fa-xmark"></i>',
        info:    '<i class="fa-solid fa-circle-info"></i>',
        warning: '<i class="fa-solid fa-circle-exclamation"></i>'
      };
      const subtitleMap = {
        success: 'Đơn hàng đã được đặt thành công',
        error:   'Vui lòng kiểm tra lại và thử lại',
        info:    'Một số sản phẩm cần chú ý bên dưới',
        warning: 'Cần xác nhận trước khi tiếp tục'
      };

      // Build items HTML — dot + tên, lý do bên dưới nếu có
      let bodyHtml = '';
      if (typeof items === 'string') {
        bodyHtml = `<div class="popup-plain-msg">${items}</div>`;
      } else if (Array.isArray(items) && items.length > 0) {
        bodyHtml = items.map(it => `
          <div class="popup-item-row row-${it.status}">
            <div class="row-dot" style="flex-shrink:0; align-self:flex-start; margin-top:5px;"></div>
            <div class="row-info-wrap">
              <div class="row-name">${it.name}</div>
              ${it.reason ? `<div class="row-reason">${it.reason}</div>` : ''}
            </div>
          </div>
        `).join('');
      }

      const autoClose = options.autoClose || 0;
      const subtitle = options.subtitle || subtitleMap[type] || '';
      const btnLabel = type === 'success'
        ? '<i class="fa-solid fa-bag-shopping"></i> Xem đơn hàng'
        : 'Đã hiểu';

      overlay.innerHTML = `
        <div class="popup-box type-${type}">
          <div class="popup-handle"></div>
          <div class="popup-header">
            <div class="popup-icon-wrap">${iconMap[type] || iconMap.info}</div>
            <div class="popup-heading">
              <p class="popup-title">${title}</p>
              ${subtitle ? `<p class="popup-subtitle">${subtitle}</p>` : ''}
            </div>
          </div>
          ${bodyHtml ? `<div class="popup-divider"></div>
          <div class="popup-body">${bodyHtml}</div>` : ''}
          <div class="popup-footer single">
            <button class="popup-btn popup-btn-primary" id="popupCloseBtn">${btnLabel}</button>
          </div>
          ${autoClose ? `<div class="popup-progress"><div class="popup-progress-bar" id="popupProgress"></div></div>` : ''}
        </div>
      `;

      document.body.appendChild(overlay);
      requestAnimationFrame(() => overlay.classList.add('show'));

      function closePopup() {
        overlay.classList.remove('show');
        setTimeout(() => overlay.remove(), 300);
      }

      overlay.querySelector('#popupCloseBtn').addEventListener('click', () => {
        closePopup();
        if (options.onConfirm) options.onConfirm();
      });
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });

      if (autoClose > 0) {
        const bar = overlay.querySelector('#popupProgress');
        if (bar) {
          bar.style.transition = `transform ${autoClose}ms linear`;
          requestAnimationFrame(() => { bar.style.transform = 'scaleX(0)'; });
        }
        setTimeout(() => { closePopup(); if (options.onConfirm) options.onConfirm(); }, autoClose);
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", BF.logout);
    document.getElementById("clearCartBtn").addEventListener("click", clearCart);
    document.getElementById("checkoutBtn").addEventListener("click", checkoutCart);
    document.getElementById("selectAllCheck").addEventListener("change", function () { toggleSelectAll(this.checked); });

    els.cartList.addEventListener("click", function (event) {
      const button = event.target.closest("[data-cart-remove]");
      if (!button) return;
      const id = Number(button.dataset.cartRemove);
      state.checkedIds.delete(id);
      removeFromCart(id);
    });

    BF.renderUserHeader();
    renderCart();
    loadAddresses();
    loadProducts();
  </script>
</body>

</html>
