<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Sale E-Commerce | Giỏ hàng</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/auth-cart-orders.css">
</head>

<body>
  <main class="app-page">
    <div class="app-shell">
      <header class="app-header">
        <a class="logo" href="../home.html" aria-label="E-Commerce">
          <i class="fa-solid fa-bolt"></i>
          E-<span>Commerce</span>
        </a>

        <nav class="nav-tabs" aria-label="Điều hướng">
          <a class="nav-tab active" href="cart.html">
            <i class="fa-solid fa-cart-shopping"></i>
            Giỏ hàng
          </a>
          <a class="nav-tab" href="orders.html">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Lịch sử
          </a>
        </nav>

        <div class="header-actions">
          <button class="icon-btn" onclick="goHome()">
            <i class="fa-solid fa-house"></i>
          </button>
          <a class="icon-btn cart-btn" href="cart.html">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="cartCount">0</span>
          </a>
          <button class="icon-btn" onclick="goProfile()">
            <img id="headerAvatar" src="./img/default-avatar.png" class="avatar-mini">
          </button>
          <button class="icon-btn" id="logoutBtn" type="button" aria-label="Đăng xuất" title="Đăng xuất">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
          </button>
        </div>
      </header>


      <div id="appMessage" class="app-message" style="margin-top: 1rem;" role="status" aria-live="polite"></div>

      <section class="app-panel">
        <div class="section-toolbar">
          <div class="section-title">
            <h2>Giỏ hàng</h2>
          </div>
          <div class="toolbar-actions">
            <button class="ghost-button" id="clearCartBtn" type="button">
              <i class="fa-solid fa-trash"></i>
              Xóa giỏ
            </button>
          </div>
        </div>

        <div class="cart-layout">
          <div id="cartList" class="cart-list"></div>
          <aside class="summary-card" aria-label="Tóm tắt giỏ hàng">
            <h3>Tóm tắt</h3>
            <div class="summary-line">
              <span>Số sản phẩm</span>
              <strong id="cartItemCount">0</strong>
            </div>
            <div class="summary-line">
              <span>Tạm tính</span>
              <strong id="cartSubtotal">0đ</strong>
            </div>
            <div class="summary-line">
              <span>Trạng thái</span>
              <strong id="cartStatus">Đang trống</strong>
            </div>
            
            <div id="shippingInfo" class="shipping-info-box hidden" style="margin-top: 15px; padding: 12px; background: #f8f9fa; border-radius: 6px; border: 1px dashed #ddd; font-size: 13px;">
              <p style="font-weight: 700; margin-bottom: 5px; color: #333;"><i class="fa-solid fa-location-dot"></i> Địa chỉ nhận hàng</p>
              <div id="shippingAddressContent" style="color: #666; line-height: 1.4;"></div>
            </div>

            <button class="primary-button" id="checkoutBtn" type="button" style="margin-top: 15px;">
              <i class="fa-solid fa-bolt"></i>
              Chốt đơn
            </button>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <script src="../assets/js/auth-cart-orders-common.js"></script>
  <script>
    const BF = window.ECommerce;
    if (!BF.requireAuth()) {
      throw new Error("Authentication required");
    }

    const state = {
      products: [],
      cart: BF.readCart(),
      isCheckingOut: false
    };

    const els = {
      appMessage: document.getElementById("appMessage"),
      cartList: document.getElementById("cartList"),
      cartCount: document.getElementById("cartCount"),
      cartItemCount: document.getElementById("cartItemCount"),
      cartSubtotal: document.getElementById("cartSubtotal"),
      cartStatus: document.getElementById("cartStatus"),
      checkoutBtn: document.getElementById("checkoutBtn")
    };

    function setAppMessage(text, type = "info") {
      BF.setMessage(els.appMessage, text, type);
    }

    function renderStats() {
      const total = state.cart.reduce((sum, item) => sum + (Number(item.price || 0) * (Number(item.quantity) || 1)), 0);
      els.cartCount.textContent = state.cart.length;
      els.cartItemCount.textContent = state.cart.length;
      els.cartSubtotal.textContent = BF.formatCurrency(total);
      els.cartStatus.textContent = state.cart.length ? "Có thể chốt đơn" : "Đang trống";

      // Cập nhật thông tin địa chỉ
      const addresses = JSON.parse(localStorage.getItem("userAddresses") || "[]");
      const user = BF.getUser() || {};
      const shippingInfo = document.getElementById("shippingInfo");
      const addressContent = document.getElementById("shippingAddressContent");

      if (addresses.length > 0 && user.phone) {
        const addr = addresses[0]; // Lấy địa chỉ đầu tiên
        shippingInfo.classList.remove("hidden");
        addressContent.innerHTML = `
          <strong>${BF.escapeHtml(addr.fullName)}</strong> · ${BF.escapeHtml(user.phone)}<br>
          ${BF.escapeHtml(addr.detail)}, ${BF.escapeHtml(addr.ward)}, ${BF.escapeHtml(addr.district)}, ${BF.escapeHtml(addr.province)}
        `;
      } else {
        shippingInfo.classList.add("hidden");
      }
    }

    async function loadProducts() {
      try {
        const data = await BF.apiRequest("/api/flashsale/products", { auth: false });
        state.products = Array.isArray(data.data) ? data.data : [];
        
        // Cập nhật lại giá trong giỏ hàng để đồng bộ với Flash Sale mới nhất
        let cartUpdated = false;
        state.cart = state.cart.map(item => {
          const product = findProduct(item.id);
          if (product) {
            const discount = Number(product.discount || 0);
            const finalPrice = product.price - (product.price * discount / 100);
            if (item.price !== finalPrice) {
              item.price = finalPrice;
              cartUpdated = true;
            }
          }
          return item;
        });
        
        if (cartUpdated) {
          BF.saveCart(state.cart);
        }

        renderCart(); // Gọi renderCart để giao diện giỏ hàng cập nhật giá mới nếu có
        renderStats();
        setAppMessage("");
      } catch (error) {
        state.products = [];
        setAppMessage(error.message || "Không tải được sản phẩm.", "error");
      }
    }



    function findProduct(productId) {
      return state.products.find(product => Number(product.id) === Number(productId));
    }

    function saveAndRenderCart() {
      BF.saveCart(state.cart);
      renderCart();
      renderStats();
    }

    function addToCart(product) {
      if (!product) return;
      if (Number(product.stock || 0) <= 0) {
        setAppMessage("Sản phẩm đã hết hàng.", "error");
        return;
      }
      const existingItem = state.cart.find(item => Number(item.id) === Number(product.id));
      if (existingItem) {
        existingItem.quantity = (Number(existingItem.quantity) || 1) + 1;
        saveAndRenderCart();
        setAppMessage(`Đã tăng số lượng ${product.name} trong giỏ hàng.`, "success");
        return;
      }

      const discount = Number(product.discount || 0);
      const finalPrice = product.price - (product.price * discount / 100);

      state.cart.push({
        id: product.id,
        name: product.name,
        price: finalPrice,
        image: product.image,
        stock: product.stock
      });
      saveAndRenderCart();
      setAppMessage("Đã thêm sản phẩm vào giỏ hàng.", "success");
    }

    function removeFromCart(productId) {
      state.cart = state.cart.filter(item => Number(item.id) !== Number(productId));
      saveAndRenderCart();
    }

    function clearCart() {
      state.cart = [];
      saveAndRenderCart();
      setAppMessage("Đã xóa giỏ hàng.", "info");
    }

    function renderCart() {
      if (!state.cart.length) {
        els.cartList.innerHTML = BF.emptyState("fa-cart-shopping", "Giỏ hàng trống", "Thêm sản phẩm Flash Sale để chốt đơn.");
        return;
      }

      els.cartList.innerHTML = state.cart.map(function (item) {
        const image = item.image || "https://images.unsplash.com/photo-1607082349566-187342175e2f?q=80&w=900&auto=format&fit=crop";
        const qty = Number(item.quantity) || 1;
        return `
          <article class="cart-item">
            <div class="cart-thumb">
              <img src="${BF.escapeHtml(image)}" alt="${BF.escapeHtml(item.name || "Sản phẩm")}">
            </div>
            <div class="item-main">
              <h3>${BF.escapeHtml(item.name || "Sản phẩm")}</h3>
              <div class="qty-control" style="display: flex; align-items: center; gap: 10px; margin: 8px 0;">
                <button class="qty-btn" onclick="changeQuantity(${item.id}, -1)" style="width: 28px; height: 28px; border-radius: 4px; border: 1px solid #ddd; background: #fff; cursor: pointer;">-</button>
                <span style="font-weight: 600; min-width: 20px; text-align: center;">${qty}</span>
                <button class="qty-btn" onclick="changeQuantity(${item.id}, 1)" style="width: 28px; height: 28px; border-radius: 4px; border: 1px solid #ddd; background: #fff; cursor: pointer;">+</button>
              </div>
              <p><strong>${BF.formatCurrency(item.price * qty)}</strong> <small class="text-muted">(Đơn giá: ${BF.formatCurrency(item.price)})</small></p>
            </div>
            <button class="ghost-button" type="button" data-cart-remove="${item.id}">
              <i class="fa-solid fa-trash"></i>
              Xóa
            </button>
          </article>
        `;
      }).join("");
    }

    function changeQuantity(id, delta) {
      const item = state.cart.find(x => Number(x.id) === Number(id));
      if (!item) return;

      const newQty = (Number(item.quantity) || 1) + delta;
      if (newQty < 1) return; // Không cho xuống dưới 1, nếu muốn xóa phải nhấn nút Xóa
      
      // Kiểm tra tồn kho nếu cần (tùy chọn)
      if (delta > 0 && item.stock && newQty > item.stock) {
        setAppMessage(`Chỉ còn ${item.stock} sản phẩm trong kho.`, "error");
        return;
      }

      item.quantity = newQty;
      saveAndRenderCart();
    }

    async function buyProduct(product, options = {}) {
      const data = await BF.apiRequest("/api/flashsale/buy", {
        method: "POST",
        body: {
          productId: Number(product.id),
          quantity: Number(product.quantity) || 1
        }
      });
      const orderId = data && data.data ? data.data.orderId : null;

      if (!options.silent) {
        setAppMessage(`Đã chốt đơn${orderId ? ` #${orderId}` : ""} cho ${product.name}.`, "success");
      }

      return {
        orderId,
        productId: data && data.data ? data.data.productId : Number(product.id),
        remainingStock: data && data.data ? data.data.remainingStock : null,
        raw: data
      };
    }

    async function buyNow(product) {
      if (!product) return;
      const button = document.querySelector(`[data-product-action="buy"][data-product-id="${product.id}"]`);
      BF.setButtonLoading(button, true, "Đang mua");
      try {
        await buyProduct(product);
        removeFromCart(product.id);
        await loadProducts();
        window.location.href = "orders.html";
      } catch (error) {
        setAppMessage(error.message || "Không thể mua sản phẩm.", "error");
      } finally {
        BF.setButtonLoading(button, false);
      }
    }

    async function checkoutCart() {
      if (!state.cart.length || state.isCheckingOut) return;

      // Kiểm tra thông tin giao hàng
      const addresses = JSON.parse(localStorage.getItem("userAddresses") || "[]");
      const user = BF.getUser() || {};
      
      if (addresses.length === 0 || !user.phone) {
        let msg = "Vui lòng cập nhật đầy đủ thông tin để chốt đơn: ";
        if (addresses.length === 0 && !user.phone) msg += "Địa chỉ và Số điện thoại.";
        else if (addresses.length === 0) msg += "Địa chỉ giao hàng.";
        else msg += "Số điện thoại.";

        setAppMessage(msg, "error");
        setTimeout(() => {
          window.location.href = "profile.html";
        }, 2500);
        return;
      }

      state.isCheckingOut = true;
      BF.setButtonLoading(els.checkoutBtn, true, "Đang chốt đơn");
      const purchasedIds = [];
      const failures = [];

      for (const item of [...state.cart]) {
        try {
          await buyProduct(item, { silent: true });
          purchasedIds.push(Number(item.id));
        } catch (error) {
          failures.push(`${item.name}: ${error.message}`);
        }
      }

      state.cart = state.cart.filter(item => !purchasedIds.includes(Number(item.id)));
      saveAndRenderCart();
      await loadProducts();

      if (purchasedIds.length && failures.length) {
        setAppMessage(`Đã chốt ${purchasedIds.length} sản phẩm. ${failures.length} sản phẩm lỗi: ${failures.join("; ")}`, "info");
      } else if (purchasedIds.length) {
        window.location.href = "orders.html";
      } else {
        setAppMessage(failures.join("; ") || "Không thể chốt đơn.", "error");
      }

      state.isCheckingOut = false;
      BF.setButtonLoading(els.checkoutBtn, false);
    }

    document.getElementById("logoutBtn").addEventListener("click", BF.logout);
    document.getElementById("clearCartBtn").addEventListener("click", clearCart);
    document.getElementById("checkoutBtn").addEventListener("click", checkoutCart);

    els.cartList.addEventListener("click", function (event) {
      const button = event.target.closest("[data-cart-remove]");
      if (!button) return;
      removeFromCart(button.dataset.cartRemove);
    });

    BF.renderUserHeader();
    renderCart();
    renderStats();
    loadProducts();
  </script>
</body>

</html>
