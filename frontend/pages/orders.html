<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyMe | Lịch sử đơn hàng</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/auth-cart-orders.css">
  <style>
    .payment-expand-area {
      grid-column: 1 / -1;
      margin-top: 15px;
      padding: 0;
      border-top: 1px solid #edf2f7;
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideDown {
      from { opacity: 0; height: 0; transform: translateY(-10px); }
      to { opacity: 1; height: auto; transform: translateY(0); }
    }
    .qr-expand-content {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      margin-top: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }
    .qr-flex-container {
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }
    .qr-left-side {
      flex: 0 0 220px;
      text-align: center;
    }
    .qr-image-wrapper {
      background: #f8fafc;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #f1f5f9;
      margin-bottom: 12px;
    }
    .qr-image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
      mix-blend-mode: multiply;
    }
    .qr-hint-text {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }
    .qr-right-side {
      flex: 1;
    }
    .qr-right-side h4 {
      margin: 0 0 16px 0;
      font-size: 15px;
      color: #1e293b;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .payment-details-table {
      width: 100%;
      border-collapse: collapse;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      font-size: 13px;
      color: #64748b;
    }
    .detail-value {
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      text-align: right;
    }
    .detail-value.highlight { color: #2563eb; }
    .detail-value.warning { color: #d97706; }
    
    .qr-footer-actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }
    @media (max-width: 640px) {
      .qr-flex-container { flex-direction: column; gap: 24px; }
      .qr-left-side { flex: 1; width: 100%; max-width: 240px; margin: 0 auto; }
    }
  </style>
</head>

<body>
  <main class="app-page">
    <div class="app-shell">
      <header class="app-header">
        <a class="logo" href="../home.html" aria-label="BuyMe">
          <i class="fa-solid fa-bolt"></i>
          Buy<span>Me</span>
        </a>

        <nav class="nav-tabs" aria-label="Điều hướng">
          <a class="nav-tab" href="cart.html">
            <i class="fa-solid fa-cart-shopping"></i>
            Giỏ hàng
          </a>
          <a class="nav-tab active" href="orders.html">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Lịch sử
          </a>
        </nav>

        <div class="header-actions">
          <button class="icon-btn" onclick="goHome()">
            <i class="fa-solid fa-house"></i>
          </button>

          <button class="icon-btn" onclick="goProfile()">
            <img id="headerAvatar" src="./img/default-avatar.png" class="avatar-mini">
          </button>
          <button class="icon-btn" id="logoutBtn" type="button" aria-label="Đăng xuất" title="Đăng xuất">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
          </button>
        </div>
      </header>

      <section class="hero-band" aria-label="Tổng quan lịch sử đơn hàng">
        <div>
          <h1>Lịch sử đơn hàng</h1>
          <p>Theo dõi các đơn hàng của bạn và thực hiện thanh toán cho các đơn hàng đang chờ.</p>
        </div>
        <div class="hero-stats">
          <div class="hero-stat">
            <strong id="orderCount">0</strong>
            <span>Đơn đang hiển thị</span>
          </div>
          <div class="hero-stat">
            <strong id="orderPageShort">1/1</strong>
            <span>Trang</span>
          </div>
          <div class="hero-stat">
            <strong id="cartCountShort">0</strong>
            <span>Trong giỏ</span>
          </div>
        </div>
      </section>

      <section class="app-panel">
        <div id="appMessage" class="app-message" role="status" aria-live="polite"></div>

        <div class="section-toolbar">
          <div class="section-title">
            <h2>Đơn hàng của tôi</h2>
            <p>Danh sách các đơn hàng bạn đã thực hiện trên hệ thống.</p>
          </div>
          <div class="order-controls">
            <select class="order-filter" id="orderStatusFilter" aria-label="Lọc trạng thái đơn hàng">
              <option value="">Tất cả trạng thái</option>
              <option value="pending">Chờ xử lý</option>
              <option value="confirmed">Đã xác nhận</option>
              <option value="paid">Đã thanh toán</option>
              <option value="shipped">Đang giao</option>
              <option value="delivered">Đã giao</option>
              <option value="completed">Hoàn tất</option>
              <option value="cancelled">Đã hủy</option>
            </select>
            <button class="ghost-button" id="refreshOrdersBtn" type="button">
              <i class="fa-solid fa-rotate"></i>
              Tải lại
            </button>
          </div>
        </div>

        <div id="orderList" class="order-list"></div>

        <div class="pagination">
          <button class="ghost-button" id="prevOrdersBtn" type="button">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <span id="orderPageText">Trang 1/1</span>
          <button class="ghost-button" id="nextOrdersBtn" type="button">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </section>
    </div>
  </main>

  <div id="orderModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="orderModalTitle">
    <article class="modal-card">
      <header class="modal-header">
        <h3 id="orderModalTitle">Chi tiết đơn hàng</h3>
        <button class="icon-btn" id="closeOrderModal" type="button" aria-label="Đóng" title="Đóng">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </header>
      <div class="modal-body" id="orderModalBody"></div>
    </article>
  </div>



  <script src="../assets/js/auth-cart-orders-common.js"></script>
  <script>
    const BF = window.ECommerce;
    if (!BF.requireAuth()) {
      throw new Error("Authentication required");
    }

    const state = {
      orders: [],
      page: 1,
      totalPages: 1,
      status: ""
    };

    const els = {
      appMessage: document.getElementById("appMessage"),
      orderList: document.getElementById("orderList"),
      orderStatusFilter: document.getElementById("orderStatusFilter"),
      orderPageText: document.getElementById("orderPageText"),
      orderPageShort: document.getElementById("orderPageShort"),
      orderCount: document.getElementById("orderCount"),
      cartCountShort: document.getElementById("cartCountShort"),
      prevOrdersBtn: document.getElementById("prevOrdersBtn"),
      nextOrdersBtn: document.getElementById("nextOrdersBtn"),
      orderModal: document.getElementById("orderModal"),
      orderModalBody: document.getElementById("orderModalBody"),
      paymentModal: document.getElementById("paymentModal"),
      paymentModalBody: document.getElementById("paymentModalBody"),
      paymentDoneBtn: document.getElementById("paymentDoneBtn"),
      closePaymentModal: document.getElementById("closePaymentModal")
    };

    function setAppMessage(text, type = "info") {
      BF.setMessage(els.appMessage, text, type);
    }

    function renderStats() {
      els.orderCount.textContent = state.orders.length;
      els.orderPageShort.textContent = `${state.page}/${state.totalPages}`;
      els.cartCountShort.textContent = BF.readCart().length;
      BF.renderUserHeader();
    }

    async function loadOrders(page = 1) {
      try {
        const params = new URLSearchParams({
          page: String(page),
          limit: "10"
        });

        if (state.status) {
          params.set("status", state.status);
        }

        const data = await BF.apiRequest(`/api/users/orders?${params.toString()}`);
        const payload = data.data || {};
        state.orders = Array.isArray(payload.orders) ? payload.orders : [];
        state.page = Number(payload.page || page);
        state.totalPages = Number(payload.totalPages || 1) || 1;
        renderOrders();
        renderStats();
        setAppMessage("");
      } catch (error) {
        state.orders = [];
        els.orderList.innerHTML = BF.emptyState("fa-triangle-exclamation", "Không tải được lịch sử đơn hàng", error.message);
        setAppMessage(error.message || "Không tải được lịch sử đơn hàng.", "error");
        renderStats();
      }
    }

    function renderOrders() {
      if (!state.orders.length) {
        els.orderList.innerHTML = BF.emptyState("fa-clock-rotate-left", "Chưa có đơn hàng", "Các đơn đã chốt sẽ xuất hiện tại đây.");
      } else {
        els.orderList.innerHTML = state.orders.map(function (order) {
          const items = Array.isArray(order.items) ? order.items : [];
          const itemNames = items.map(function (item) {
            return item.product ? item.product.name : `Sản phẩm #${item.productId}`;
          }).join(", ");
          const status = order.status || "pending";
          const paymentStatus = order.paymentStatus || "unpaid";

          return `
            <article class="order-card">
              <div class="order-main">
                <div class="order-meta">
                  <span class="status-pill ${BF.escapeHtml(status)}">${BF.statusLabel(status)}</span>
                  <span class="status-pill ${BF.escapeHtml(paymentStatus)}">${BF.paymentLabel(paymentStatus)}</span>
                </div>
                <h3>${BF.escapeHtml(order.orderNumber || `Đơn #${order.id}`)}</h3>
                <p>${BF.escapeHtml(itemNames || "Không có sản phẩm")}</p>
                <p>${BF.formatDate(order.createdAt)} · <strong>${BF.formatCurrency(order.finalPrice || order.totalPrice)}</strong></p>
              </div>
              <div class="order-actions">
                ${status === 'pending' ? `
                  <button class="danger-button ghost-button" type="button" data-order-cancel="${order.id}">
                    <i class="fa-solid fa-xmark"></i>
                    Hủy đơn
                  </button>
                ` : ""}
                <button class="ghost-button" type="button" data-order-detail="${order.id}">
                  <i class="fa-solid fa-eye"></i>
                  Chi tiết
                </button>
                ${(status !== 'cancelled' && paymentStatus !== 'paid') ? `
                  <button class="primary-button" type="button" data-order-pay="${order.id}">
                    <i class="fa-solid fa-credit-card"></i>
                    Thanh toán ngay
                  </button>
                ` : ""}
              </div>
              <div class="payment-expand-area hidden" id="payment-area-${order.id}">
                <!-- Nội dung QR sẽ được chèn vào đây khi bấm nút PayOS -->
              </div>
            </article>
          `;
        }).join("");
      }

      els.orderPageText.textContent = `Trang ${state.page}/${state.totalPages}`;
      els.prevOrdersBtn.disabled = state.page <= 1;
      els.nextOrdersBtn.disabled = state.page >= state.totalPages;
    }

    async function showOrderDetail(orderId) {
      try {
        const data = await BF.apiRequest(`/api/users/orders/${orderId}`);
        const order = data.data || {};
        const items = Array.isArray(order.items) ? order.items : [];

        els.orderModalBody.innerHTML = `
          <div class="summary-line">
            <span>Mã đơn</span>
            <strong>${BF.escapeHtml(order.orderNumber || `#${order.id}`)}</strong>
          </div>
          <div class="summary-line">
            <span>Trạng thái</span>
            <strong>${BF.statusLabel(order.status)}</strong>
          </div>
          <div class="summary-line">
            <span>Thanh toán</span>
            <strong>${BF.paymentLabel(order.paymentStatus)}</strong>
          </div>
          <div class="summary-line">
            <span>Tổng tiền</span>
            <strong>${BF.formatCurrency(order.finalPrice || order.totalPrice)}</strong>
          </div>
          <div class="detail-items">
            ${items.map(function (item) {
          const product = item.product || {};
          return `
                <article class="cart-item">
                  <div class="cart-thumb">
                    <img src="${BF.escapeHtml(product.image || "https://images.unsplash.com/photo-1607082349566-187342175e2f?q=80&w=900&auto=format&fit=crop")}" alt="${BF.escapeHtml(product.name || "Sản phẩm")}">
                  </div>
                  <div class="item-main">
                    <h3>${BF.escapeHtml(product.name || `Sản phẩm #${item.productId}`)}</h3>
                    <p>Số lượng: ${item.quantity}</p>
                    <p><strong>${BF.formatCurrency(item.subtotal || item.unitPrice)}</strong></p>
                  </div>
                </article>
              `;
        }).join("")}
          </div>
        `;
        els.orderModal.classList.remove("hidden");
      } catch (error) {
        setAppMessage(error.message || "Không tải được chi tiết đơn hàng.", "error");
      }
    }

    async function createPayment(orderId, button) {
      const expandArea = document.getElementById(`payment-area-${orderId}`);
      
      // Nếu đang mở rồi thì đóng lại (toggle)
      if (expandArea && !expandArea.classList.contains("hidden") && expandArea.dataset.loaded === orderId) {
        expandArea.classList.add("hidden");
        return;
      }

      BF.setButtonLoading(button, true, "Đang tạo QR");
      try {
        const res = await BF.apiRequest("/api/payment/create_url", {
          method: "POST",
          body: { 
            orderId: Number(orderId),
            returnUrl: window.location.href,
            cancelUrl: window.location.href
          }
        });
        const data = res.data;
        if (!data || !data.checkoutUrl) {
          throw new Error("Không thể tạo liên kết thanh toán. Vui lòng thử lại sau.");
        }

        const qrUrl = `https://img.vietqr.io/image/${data.bin}-${data.accountNumber}-compact2.png?amount=${data.amount}&addInfo=${encodeURIComponent(data.description)}&accountName=${encodeURIComponent(data.accountName)}`;

        expandArea.innerHTML = `
          <div class="qr-expand-content">
            <div class="qr-flex-container">
              <div class="qr-left-side">
                <div class="qr-image-wrapper">
                  <img src="${qrUrl}" alt="Mã QR Thanh toán">
                </div>
                <p class="qr-hint-text">
                  <i class="fa-solid fa-qrcode"></i><br>
                  Sử dụng ứng dụng ngân hàng để quét mã
                </p>
              </div>
              <div class="qr-right-side">
                <h4>Thông tin chuyển khoản</h4>
                <div class="payment-details-table">
                  <div class="detail-row">
                    <span class="detail-label">Số tài khoản</span>
                    <span class="detail-value highlight">${data.accountNumber}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Chủ tài khoản</span>
                    <span class="detail-value">${data.accountName.toUpperCase()}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Số tiền cần chuyển</span>
                    <span class="detail-value highlight">${BF.formatCurrency(data.amount)}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Nội dung chuyển khoản</span>
                    <span class="detail-value warning">${data.description}</span>
                  </div>
                </div>
                <div class="qr-footer-actions">
                   <a href="${data.checkoutUrl}" target="_blank" class="primary-button mini">
                     Tiếp tục thanh toán <i class="fa-solid fa-chevron-right"></i>
                   </a>
                   <button class="ghost-button mini" onclick="loadOrders(state.page)">
                     Đã chuyển khoản
                   </button>
                </div>
              </div>
            </div>
          </div>
        `;

        expandArea.classList.remove("hidden");
        expandArea.dataset.loaded = orderId;
        setAppMessage("Đã tạo mã QR thanh toán phía dưới đơn hàng.", "success");
      } catch (error) {
        setAppMessage(error.message || "Không tạo được thanh toán PayOS.", "error");
      } finally {
        BF.setButtonLoading(button, false);
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", BF.logout);
    document.getElementById("refreshOrdersBtn").addEventListener("click", function () {
      loadOrders(state.page);
    });



    els.orderStatusFilter.addEventListener("change", function () {
      state.status = els.orderStatusFilter.value;
      loadOrders(1);
    });

    els.prevOrdersBtn.addEventListener("click", function () {
      if (state.page > 1) loadOrders(state.page - 1);
    });

    els.nextOrdersBtn.addEventListener("click", function () {
      if (state.page < state.totalPages) loadOrders(state.page + 1);
    });

    async function cancelOrder(orderId, button) {
      if (!confirm("Bạn có chắc chắn muốn hủy đơn hàng này không?")) return;
      
      BF.setButtonLoading(button, true, "Đang hủy...");
      try {
        await BF.apiRequest(`/api/users/orders/${orderId}/cancel`, {
          method: "POST"
        });
        setAppMessage("Đã hủy đơn hàng thành công.", "success");
        loadOrders(state.page); // Refresh list
      } catch (error) {
        setAppMessage(error.message || "Không thể hủy đơn hàng.", "error");
      } finally {
        BF.setButtonLoading(button, false);
      }
    }

    els.orderList.addEventListener("click", function (event) {
      const detailButton = event.target.closest("[data-order-detail]");
      const payButton = event.target.closest("[data-order-pay]");
      const cancelButton = event.target.closest("[data-order-cancel]");
      
      if (detailButton) showOrderDetail(detailButton.dataset.orderDetail);
      if (payButton) createPayment(payButton.dataset.orderPay, payButton);
      if (cancelButton) cancelOrder(cancelButton.dataset.orderCancel, cancelButton);
    });



    document.getElementById("closeOrderModal").addEventListener("click", function () {
      els.orderModal.classList.add("hidden");
    });

    els.orderModal.addEventListener("click", function (event) {
      if (event.target === els.orderModal) {
        els.orderModal.classList.add("hidden");
      }
    });

    async function checkPaymentReturn() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get("code");
      const orderCode = urlParams.get("orderCode");

      if (code && orderCode) {
        try {
          const data = await BF.apiRequest("/api/payment/verify_return", {
            method: "POST",
            body: { orderCode: Number(orderCode) }
          });
          
          if (data && data.isPaid) {
            setAppMessage("Thanh toán thành công! Trạng thái đơn hàng đã được cập nhật.", "success");
          } else if (code !== "00") {
            setAppMessage("Thanh toán đã bị hủy hoặc không thành công.", "info");
          }
        } catch (err) {
          console.error("Lỗi verify payment", err);
        } finally {
          // Xóa tham số trên URL để tránh gọi lại khi F5
          window.history.replaceState({}, document.title, window.location.pathname);
          loadOrders(state.page); // Tải lại danh sách đơn hàng
        }
      } else {
        loadOrders(1);
      }
    }

    BF.renderUserHeader();
    renderStats();
    checkPaymentReturn();
  </script>
</body>

</html>
