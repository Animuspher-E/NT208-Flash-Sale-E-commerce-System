worker_processes auto;

events {
    worker_connections 1024;
}

//Cấu hình limit
http {
    include       mime.types;
    default_type  application/octet-stream;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    limit_req_zone $binary_remote_addr zone=flashsale_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        location /api/ {
            
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://backend:3000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/flashsale/buy {
            limit_req zone=flashsale_limit burst=3 nodelay;

            proxy_pass http://backend:3000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass http://backend:3000;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        error_page 429 /rate_limit.json;
        location = /rate_limit.json {
            default_type application/json;
            return 429 '{"success": false, "message": "Quá nhiều request, vui lòng thử lại sau"}';
        }
    }
}
