# ================================================
# File: nginx/nginx.conf
# Mục đích: Cấu hình Nginx làm cổng vào cho hệ thống
#   - Nhận request từ client và chuyển tiếp vào Node.js
#   - Chặn IP spam/DDoS ở cấp độ mạng
#   - Hỗ trợ WebSocket để Socket.io hoạt động
#   - Xử lý SSL (HTTPS)
# ================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ============================================
    # PHẦN 1: CẤU HÌNH RATE LIMIT CẤP ĐỘ MẠNG
    # Dùng để chặn DDoS/Spam cơ bản
    # ============================================
    
    # Tạo vùng nhớ "api_limit" để lưu thống kê theo IP
    # zone=api_limit:10m  => Dùng 10MB RAM để lưu ~160.000 địa chỉ IP
    # rate=30r/s          => Mỗi IP chỉ được gửi tối đa 30 request/giây
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Riêng API mua hàng Flash Sale, giới hạn chặt hơn: 5 request/giây
    limit_req_zone $binary_remote_addr zone=flashsale_limit:10m rate=5r/s;

    # ============================================
    # PHẦN 2: SERVER LẮNG NGHE TRÊN CỔNG 80 (HTTP)
    # Tự động chuyển hướng sang HTTPS
    # ============================================
    server {
        listen 80;
        server_name localhost;

        # Chuyển tất cả HTTP sang HTTPS
        return 301 https://$host$request_uri;
    }

    # ============================================
    # PHẦN 3: SERVER LẮNG NGHE TRÊN CỔNG 443 (HTTPS)
    # Đây là cổng chính phục vụ client
    # ============================================
    server {
        listen 443 ssl;
        server_name localhost;

        # Đường dẫn đến chứng chỉ SSL
        # (Tạo bằng: openssl req -x509 -nodes -days 365 -newkey rsa:2048 ...)
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Chỉ dùng các phiên bản TLS mới, an toàn
        ssl_protocols TLSv1.2 TLSv1.3;

        # ==========================================
        # PHẦN 4: CẤU HÌNH PROXY THÔNG THƯỜNG
        # Chuyển tiếp /api/* vào Node.js
        # ==========================================
        location /api/ {
            
            # Áp dụng rate limit: burst=10 nghĩa là cho phép "vượt" tối đa 10 request
            # nodelay: không bắt request chờ, từ chối ngay nếu quá giới hạn
            limit_req zone=api_limit burst=10 nodelay;

            # Địa chỉ backend Node.js đang chạy bên trong Docker/server
            proxy_pass http://localhost:3000;

            # Các header để Node.js biết thông tin thật của request
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # PHẦN 5: GIỚI HẠN CHẶT HƠN CHO API MUA HÀNG
        # /api/v1/flashsale/buy chỉ cho 5 request/giây/IP
        # ==========================================
        location /api/v1/flashsale/buy {
            # Áp dụng zone giới hạn nghiêm ngặt hơn cho flash sale
            limit_req zone=flashsale_limit burst=3 nodelay;

            proxy_pass http://localhost:3000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # PHẦN 6: CẤU HÌNH WEBSOCKET PROXY
        # Socket.io cần được xử lý đặc biệt, khác HTTP thông thường
        # 
        # Cách hoạt động:
        #   Client gửi HTTP Upgrade request -> Nginx chuyển thành WebSocket
        #   Sau đó dữ liệu 2 chiều chạy liên tục qua kết nối này
        # ==========================================
        location /socket.io/ {
            proxy_pass http://localhost:3000;

            # Các header bắt buộc để kích hoạt giao thức WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            # Tăng timeout để WebSocket không bị ngắt khi không có dữ liệu
            # (Socket.io gửi ping/pong định kỳ để giữ kết nối)
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        # ==========================================
        # PHẦN 7: PHẢN HỒI KHI BỊ RATE LIMIT
        # Khi Nginx từ chối (429), trả về JSON thay vì HTML mặc định
        # ==========================================
        error_page 429 /rate_limit.json;
        location = /rate_limit.json {
            default_type application/json;
            return 429 '{"success": false, "message": "Quá nhiều request, vui lòng thử lại sau"}';
        }
    }
}
